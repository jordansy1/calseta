name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "feat/mvp-dev"]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calseta_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: pip install -e ".[dev]"
      - run: make lint
      - run: make typecheck
      # Hard gate per SUPPLY_CHAIN.md "CI Verification" — a PR cannot remove
      # ignore-scripts=true from ui/.npmrc without failing CI. Runs BEFORE
      # `npm ci` so a tampered .npmrc never gets to execute lifecycle scripts
      # on the runner. Shai-Hulud (May 2026) demonstrated preinstall as the
      # primary worm vector; this flag is the load-bearing defense.
      - name: Verify ui/.npmrc enforces ignore-scripts=true
        run: |
          grep -q '^ignore-scripts=true' ui/.npmrc \
            || (echo "ERROR: ui/.npmrc must contain 'ignore-scripts=true' per SUPPLY_CHAIN.md"; exit 1)
      - name: UI build
        run: cd ui && npm ci && npm run build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: alembic upgrade head
      - name: Apply procrastinate schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: |
          python -c "
          import asyncio
          from app.queue.registry import procrastinate_app
          async def _apply():
              try:
                  async with procrastinate_app.open_async():
                      await procrastinate_app.schema_manager.apply_schema_async()
              except Exception as e:
                  if 'already exists' in str(e):
                      print('Procrastinate schema already applied.')
                  else:
                      raise
          asyncio.run(_apply())
          " || true
      - run: make test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
      - name: Check OpenAPI spec is up to date
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: make docs-openapi-check
