name: Bug Report
description: Report a bug in Calseta
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Calseta version
      description: "Output of `docker inspect ghcr.io/calseta/calseta --format '{{index .Config.Labels \"org.opencontainers.image.version\"}}'` or the git tag/commit"
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API server
        - Worker
        - MCP server
        - Admin UI
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. POST /v1/alerts with payload ...
        2. Check enrichment status ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant logs. This will be formatted as code automatically.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker: 24.0.7
        - PostgreSQL: 15
        - Deployment: docker compose / Kubernetes / etc.
