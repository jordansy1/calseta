name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "feat/mvp-dev"]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calseta_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: pip install -e ".[dev]"
      - run: make lint
      - run: make typecheck
      - name: UI build
        run: cd ui && npm ci && npm run build
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: alembic upgrade head
      - name: Apply procrastinate schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: |
          python -c "
          import asyncio
          from app.queue.registry import procrastinate_app
          async def _apply():
              try:
                  async with procrastinate_app.open_async():
                      await procrastinate_app.schema_manager.apply_schema_async()
              except Exception as e:
                  if 'already exists' in str(e):
                      print('Procrastinate schema already applied.')
                  else:
                      raise
          asyncio.run(_apply())
          " || true
      - run: make test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
      - name: Check OpenAPI spec is up to date
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: make docs-openapi-check
