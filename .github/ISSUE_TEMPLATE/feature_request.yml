name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem you're trying to solve and your proposed solution.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Alert ingestion / normalization
        - Enrichment
        - Workflows
        - Detection rules
        - Context documents
        - Agent dispatch
        - MCP server
        - REST API
        - Admin UI
        - Auth / API keys
        - Deployment / Docker
        - New integration (alert source)
        - New integration (enrichment provider)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered and why they don't work.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, example payloads, or anything else that helps explain.
