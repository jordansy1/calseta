name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, "feat/mvp-dev"]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calseta_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: make lint
      - run: make typecheck
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: alembic upgrade head
      - name: Apply procrastinate schema
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: |
          python -c "
          import asyncio
          from app.queue.registry import procrastinate_app
          async def _apply():
              try:
                  async with procrastinate_app.open_async():
                      await procrastinate_app.schema_manager.apply_schema_async()
              except Exception as e:
                  if 'already exists' in str(e):
                      print('Procrastinate schema already applied.')
                  else:
                      raise
          asyncio.run(_apply())
          " || true
      - run: make test
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
      - name: Check OpenAPI spec is up to date
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/calseta_test
        run: make docs-openapi-check
